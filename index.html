<!DOCTYPE html>
<html lang="uz" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Hub - Muzaffar</title>
    
    <!-- Premium Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 15s infinite alternate ease-in-out',
                        'blob-reverse': 'blob-reverse 20s infinite alternate ease-in-out',
                        'pulse-ring': 'pulse-ring 3s cubic-bezier(0.215, 0.61, 0.355, 1) infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1) rotate(0deg)' },
                            '50%': { transform: 'translate(5vw, 5vh) scale(1.1) rotate(180deg)' },
                            '100%': { transform: 'translate(-5vw, -5vh) scale(0.9) rotate(360deg)' },
                        },
                        'blob-reverse': {
                            '0%': { transform: 'translate(0px, 0px) scale(1.1) rotate(360deg)' },
                            '50%': { transform: 'translate(-5vw, 10vh) scale(0.9) rotate(180deg)' },
                            '100%': { transform: 'translate(5vw, -5vh) scale(1) rotate(0deg)' },
                        },
                        'pulse-ring': {
                            '0%': { transform: 'scale(0.8)', opacity: '0.8' },
                            '100%': { transform: 'scale(1.5)', opacity: '0' },
                        },
                        shine: {
                            '100%': { left: '125%' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="relative min-h-screen overflow-x-hidden selection:bg-indigo-500 selection:text-white flex flex-col bg-[#030712] text-slate-100 font-sans">

    <!-- Ambient Background Elements -->
    <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
        <div class="absolute w-[70vw] h-[70vw] rounded-full bg-indigo-600/20 blur-[100px] -top-[20%] -left-[10%] animate-blob mix-blend-screen"></div>
        <div class="absolute w-[60vw] h-[60vw] rounded-full bg-fuchsia-600/20 blur-[100px] top-[30%] -right-[20%] animate-blob-reverse mix-blend-screen"></div>
        <div class="absolute w-[80vw] h-[80vw] rounded-full bg-blue-600/20 blur-[100px] -bottom-[20%] left-[20%] animate-blob mix-blend-screen"></div>
        <div class="absolute inset-0 opacity-[0.03]" style="background-image: url('data:image/svg+xml,%3Csvg viewBox=%220 0 200 200%22 xmlns=%22http://www.w3.org/2000/svg%22%3E%3Cfilter id=%22noiseFilter%22%3E%3CfeTurbulence type=%22fractalNoise%22 baseFrequency=%220.65%22 numOctaves=%223%22 stitchTiles=%22stitch%22/%3E%3C/filter%3E%3Crect width=%22100%25%22 height=%22100%25%22 filter=%22url(%23noiseFilter)%22/%3E%3C/svg%3E');"></div>
    </div>

    <script>

                name: "Muzaffar",
                bio: "Apple qurilmalari holatini tezkor tekshirish va ishonchli ta'mirlash. Shunchaki ta'mirlash emas, qurilmangizga ikkinchi hayot beramiz.",

                    { icon: `<svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.243-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`, text: "Toshkent, O'zbekiston" }
                ]
            },
            links: [
                {
                    title: "Narxni bilish",
                    subtitle: "Qurilmangizni ta'mirlash narxini 1 daqiqada bilib oling.",
                    icon: "⚡️",
                    url: "https://t.me/muzaffaridoc"
                },
                {
                    title: "Usta bilan aloqa",
                    subtitle: "Telegram orqali savollarga to'g'ridan-to'g'ri javob oling.",
                    icon: "💬",
                    url: "https://t.me/muzaffaridoc"
                },
                {
                    title: "Manzil & Vaqt",
                    subtitle: "Google Maps orqali bizni osongina topib keling.",
                    icon: "📍",
                    url: "https://maps.app.goo.gl/Tnx3WvUQSwJjoatZ9"
                },
                {
                    title: "Mijozlar fikri",
                    subtitle: "Video-otzivlar va amaliy isbotlar.",
                    icon: "⭐",
                    url: "https://t.me/idoctor_andijon"
                }
            ],
            socials: [
                { url: "https://t.me/muzaffaridoc", icon: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.19-.08-.05-.19-.02-.27 0-.11.03-1.84 1.18-5.18 3.44-.49.34-.93.5-1.33.49-.44-.01-1.28-.25-1.9-.46-.77-.25-1.38-.38-1.33-.8.02-.22.33-.45.92-.68 3.59-1.56 5.98-2.6 7.17-3.1 3.42-1.42 4.13-1.67 4.59-1.68.1 0 .32.02.44.11.1.08.13.19.14.28 0 .04.01.12 0 .21z"/></svg>` },
                { url: "https://instagram.com/muzaffar_idoctor", icon: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>` },
                { url: "#", icon: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>` },
                { url: "https://github.com/madumarovmuzaffar84-prog", icon: `<svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>` }
            ],
            footer: "© 2026 iDoctor. Barcha huquqlar himoyalangan."
        };
    </script>

    <div id="app" class="relative z-10 w-full flex-grow flex flex-col pt-12 pb-10 px-4 sm:px-6 lg:px-8"></div>

    <script>
        const app = document.getElementById('app');

        const gridContainer = document.createElement('div');
        gridContainer.className = 'grid grid-cols-1 md:grid-cols-3 gap-5 md:gap-6 w-full max-w-5xl mx-auto mb-12';

        const profileCard = `
            <div class="col-span-1 md:col-span-2 relative overflow-hidden bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[2.5rem] p-8 md:p-12 flex flex-col justify-center group transition-all duration-500 ease-out hover:bg-white/10 hover:border-white/20 hover:-translate-y-1 shadow-[0_8px_32px_rgba(0,0,0,0.3),inset_0_1px_0_rgba(255,255,255,0.1)] hover:shadow-[0_20px_40px_rgba(0,0,0,0.4),inset_0_1px_0_rgba(255,255,255,0.2)]">
                
                <div class="relative w-24 h-24 sm:w-28 sm:h-28 mb-8 z-10">
                    <div class="absolute inset-0 bg-indigo-500 rounded-full animate-pulse-ring blur-md"></div>
                    <img src="${config.profile.avatar}" alt="Avatar" class="relative w-full h-full object-cover rounded-full border-[3px] border-white/20 shadow-xl">
                </div>
                
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-br from-white to-white/60 mb-5 tracking-tight z-10">
                    ${config.profile.name}
                </h1>
                
                <p class="text-base sm:text-lg text-slate-300 max-w-lg mb-10 leading-relaxed font-medium z-10">
                    ${config.profile.bio}
                </p>
                
                <div class="flex flex-wrap gap-3 mt-auto z-10">
                    ${config.profile.badges.map(badge => `
                        <div class="flex items-center gap-2.5 px-4 py-2.5 rounded-2xl bg-white/5 border border-white/10 text-sm font-semibold text-slate-200 backdrop-blur-md shadow-sm transition-colors hover:bg-white/10">
                            ${badge.icon} <span>${badge.text}</span>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        const linksHTML = config.links.map((link) => {
            return `
                <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                   class="col-span-1 relative overflow-hidden bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[2.5rem] p-7 flex flex-col group transition-all duration-500 ease-out hover:-translate-y-2 hover:bg-white/10 hover:border-white/20 shadow-[0_8px_32px_rgba(0,0,0,0.3),inset_0_1px_0_rgba(255,255,255,0.1)] hover:shadow-[0_20px_40px_rgba(0,0,0,0.4),inset_0_1px_0_rgba(255,255,255,0.2)] h-full">
                    
                    <div class="absolute top-0 -left-[100%] w-1/2 h-full bg-gradient-to-r from-transparent via-white/10 to-transparent -skew-x-12 group-hover:animate-[shine_1.5s_ease-in-out]"></div>
                    
                    <div class="absolute top-7 right-7 text-white/20 group-hover:text-white/80 transition-colors duration-300 z-10">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"></path></svg>
                    </div>

                    <div class="w-14 h-14 sm:w-16 sm:h-16 rounded-[1.25rem] bg-white/5 border border-white/10 flex items-center justify-center text-2xl sm:text-3xl mb-10 shadow-inner group-hover:scale-110 group-hover:bg-white/10 transition-all duration-500 z-10">
                        ${link.icon}
                    </div>

                    <div class="mt-auto z-10">
                        <h3 class="text-xl font-bold text-white/90 mb-2 group-hover:text-white transition-colors duration-300 tracking-tight leading-snug">${link.title}</h3>
                        <p class="text-sm text-slate-400 leading-relaxed font-medium group-hover:text-slate-300 transition-colors">${link.subtitle}</p>
                    </div>
                </a>
            `;
        }).join('');

        gridContainer.innerHTML = profileCard + linksHTML;

        const footerContainer = document.createElement('div');
        footerContainer.className = 'flex flex-col items-center w-full mt-auto pt-8';

        const socialsHTML = `
            <div class="flex items-center gap-4 mb-8">
                ${config.socials.map(social => `
                    <a href="${social.url}" target="_blank" rel="noopener noreferrer" 
                       class="p-4 rounded-full bg-white/5 backdrop-blur-xl border border-white/10 shadow-[0_4px_16px_rgba(0,0,0,0.2),inset_0_1px_0_rgba(255,255,255,0.1)] text-slate-400 hover:text-white hover:scale-110 hover:bg-white/10 hover:border-white/20 hover:-translate-y-1 hover:shadow-[0_8px_24px_rgba(0,0,0,0.3),inset_0_1px_0_rgba(255,255,255,0.2)] transition-all duration-300 flex items-center justify-center group">
                        <div class="group-hover:animate-pulse">${social.icon}</div>
                    </a>
                `).join('')}
            </div>
        `;

        const footerHTML = `
            <p class="text-[11px] sm:text-xs font-bold text-slate-500 tracking-widest uppercase">
                ${config.footer}
            </p>
        `;

        footerContainer.innerHTML = socialsHTML + footerHTML;

        app.appendChild(gridContainer);
        app.appendChild(footerContainer);
    </script>
</body>
</html>
